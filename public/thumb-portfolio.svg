<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Space Grotesk','IBM Plex Sans',system-ui,sans-serif">
  <!-- background -->
  <rect width="800" height="500" fill="#0c0d0f"/>

  <!-- faint marquee-style outline text -->
  <text x="20" y="150" font-size="120" font-weight="700" letter-spacing="-2"
        fill="none" stroke="rgba(201,169,106,0.06)" stroke-width="1">PORTFOLIO</text>
  <text x="120" y="430" font-size="120" font-weight="700" letter-spacing="-2"
        fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1">STATIC · DARK</text>

  <!-- browser window -->
  <rect x="80" y="70" width="640" height="360" rx="10" fill="#131517" stroke="#24272b"/>
  <!-- title bar -->
  <line x1="80" y1="116" x2="720" y2="116" stroke="#24272b"/>
  <circle cx="108" cy="93" r="6" fill="#c9a96a"/>
  <circle cx="130" cy="93" r="6" fill="#6b7075"/>
  <circle cx="152" cy="93" r="6" fill="#6b7075"/>
  <!-- address pill -->
  <rect x="250" y="83" width="300" height="20" rx="10" fill="#0c0d0f" stroke="#24272b"/>
  <text x="400" y="97" font-family="'IBM Plex Mono',monospace" font-size="12"
        fill="#8b9096" text-anchor="middle">omar76901.github.io</text>

  <!-- content -->
  <g>
    <!-- status line -->
    <circle cx="124" cy="170" r="5" fill="#c9a96a"/>
    <text x="138" y="175" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#8b9096">backend developer · based in Italy</text>

    <!-- name -->
    <text x="120" y="250" font-size="56" font-weight="600" letter-spacing="-1" fill="#e8e9ea">Omar Nespoli</text>

    <!-- subtitle -->
    <text x="120" y="295" font-family="'IBM Plex Mono',monospace" font-size="16" fill="#c9a96a">// reliable, secure distributed systems</text>

    <!-- mini buttons -->
    <rect x="120" y="330" width="150" height="38" rx="3" fill="none" stroke="#c9a96a"/>
    <text x="195" y="354" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#c9a96a" text-anchor="middle">view projects →</text>
    <rect x="284" y="330" width="110" height="38" rx="3" fill="none" stroke="#2a2d31"/>
    <text x="339" y="354" font-family="'IBM Plex Mono',monospace" font-size="13" fill="#c9ccce" text-anchor="middle">about me</text>
  </g>
</svg>

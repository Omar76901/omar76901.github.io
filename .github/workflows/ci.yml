name: CI

# Check di build sulle PR verso main (incluse quelle di Dependabot):
# se un aggiornamento di dipendenze rompe il build, la PR risulta rossa
# e non viene mergiata. Il rilascio su Pages è gestito da deploy.yml,
# che a sua volta builda prima di rilasciare (deploy needs build).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Niente package-lock.json nel repo → install (non ci).
      - run: npm install

      # Audit informativo sulle dipendenze runtime (non blocca la PR).
      - name: Security audit (runtime deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      # tsc -b (type-check) + vite build: fallisce se l'update rompe qualcosa.
      - run: npm run build

version: 2
updates:
  # Dipendenze npm del sito
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    # Raggruppa i pacchetti interdipendenti in un'unica PR (anche i major),
    # così non si creano conflitti di peer dependency tra PR separate.
    groups:
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - vite
          - "@vitejs/*"
      # Tutto il resto: solo minor/patch insieme.
      others:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Versioni delle GitHub Actions usate nei workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - ci
    commit-message:
      prefix: "ci"
